name: Scan, Lint, Test, and Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  test_and_lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Frontend Dependencies
        run: npm install

      - name: Run Pre-Commit Linting
        run: |
          pip install pre-commit
          pre-commit run --all-files

  deploy_production:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: test_and_lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANALIZADORMELATERETRO }}' > $GOOGLE_APPLICATION_CREDENTIALS
          firebase deploy --only hosting,functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --force
